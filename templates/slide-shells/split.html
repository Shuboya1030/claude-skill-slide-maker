<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .slide {
      width: 1920px;
      height: 1080px;
      display: flex;
      padding: var(--slide-padding, 80px);
      box-sizing: border-box;
      background: var(--bg-primary);
      color: var(--text-primary);
      gap: 80px;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .slide h2 {
      font-size: var(--heading-size, 56px);
      font-weight: var(--heading-weight, 600);
      margin-bottom: 32px;
      color: var(--accent-primary);
    }
    .slide p {
      font-size: var(--body-size, 32px);
      line-height: 1.6;
    }
    .image-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: var(--border-radius, 16px);
    }
  </style>
</head>
<body>
  <div class="slide slide-split">
    <div class="content">
      <h2>{{title}}</h2>
      <p>{{content}}</p>
    </div>
    <div class="image-container">
      <img src="{{imageSrc}}" alt="{{imageAlt}}">
    </div>
  </div>
</body>
</html>
